# configuration for Railway / Nixpacks build system
[phases.build]
cmds = [
    "composer install --no-dev --optimize-autoloader --non-interactive",
    "npm install",
    "npm run build"
]

[start]
cmd = "php artisan migrate --force && php artisan storage:link && php artisan serve --host=0.0.0.0 --port=$PORT"
